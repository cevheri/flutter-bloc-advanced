<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4F46E5"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .box-title { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .box-body { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .label { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #64748B; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>

  <text x="60" y="62" class="title">High-Level Architecture</text>
  <text x="60" y="90" class="subtitle">Flutter BLoC template flow from app entry to data sources.</text>

  <rect x="60" y="140" width="240" height="112" rx="20" fill="url(#card)" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="88" y="182" class="box-title">App Entry Points</text>
  <text x="88" y="210" class="box-body">main_local.dart</text>
  <text x="88" y="232" class="box-body">main_prod.dart</text>

  <rect x="360" y="140" width="250" height="112" rx="20" fill="url(#card)" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="388" y="182" class="box-title">Configuration Layer</text>
  <text x="388" y="210" class="box-body">Environment, local storage,</text>
  <text x="388" y="232" class="box-body">logging, app setup</text>

  <rect x="360" y="308" width="250" height="112" rx="20" fill="url(#card)" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="388" y="350" class="box-title">Presentation Layer</text>
  <text x="388" y="378" class="box-body">Screens, widgets,</text>
  <text x="388" y="400" class="box-body">design system</text>

  <rect x="670" y="308" width="220" height="112" rx="20" fill="url(#card)" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="698" y="350" class="box-title">BLoC Layer</text>
  <text x="698" y="378" class="box-body">Events, states,</text>
  <text x="698" y="400" class="box-body">business logic</text>

  <rect x="950" y="308" width="190" height="112" rx="20" fill="url(#card)" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="978" y="350" class="box-title">Repository</text>
  <text x="978" y="378" class="box-body">Abstracted data</text>
  <text x="978" y="400" class="box-body">access layer</text>

  <rect x="950" y="140" width="190" height="112" rx="20" fill="url(#card)" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="978" y="182" class="box-title">Data Layer</text>
  <text x="978" y="210" class="box-body">Models, API,</text>
  <text x="978" y="232" class="box-body">mock JSON</text>

  <rect x="950" y="30" width="190" height="72" rx="18" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="978" y="62" class="box-title" style="font-size:18px;">Sources</text>
  <text x="978" y="84" class="box-body">Mock Assets / Real API</text>

  <line x1="300" y1="196" x2="360" y2="196" stroke="#4F46E5" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="300" y1="196" x2="360" y2="364" stroke="#4F46E5" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="610" y1="364" x2="670" y2="364" stroke="#4F46E5" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="890" y1="364" x2="950" y2="364" stroke="#4F46E5" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1045" y1="308" x2="1045" y2="252" stroke="#4F46E5" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1045" y1="140" x2="1045" y2="102" stroke="#4F46E5" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M 485 252 C 485 280, 485 280, 485 308" stroke="#64748B" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrowMuted)"/>
  <path d="M 520 252 C 650 252, 720 252, 780 308" stroke="#64748B" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrowMuted)"/>

  <text x="432" y="286" class="label">provides</text>
  <text x="620" y="272" class="label">provides</text>
</svg>
