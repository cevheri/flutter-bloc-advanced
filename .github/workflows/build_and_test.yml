name: CI

on:
  push:
    branches:
      - main
      - dev
      - feature/*
      - bugfix/*
      - hotfix/*
      - release/v*
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format . --line-length=120 --set-exit-if-changed

      - name: Analyze
        run: flutter analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        timeout-minutes: 15
        run: flutter test --coverage --timeout=30s --concurrency=4 --reporter=compact

      - name: Check coverage threshold
        run: |
          if [ -f coverage/lcov.info ]; then
            total_lines=$(grep -c "DA:" coverage/lcov.info || echo "0")
            hit_lines=$(grep "DA:" coverage/lcov.info | grep -cv ",0$" || echo "0")
            if [ "$total_lines" -gt 0 ]; then
              coverage=$((hit_lines * 100 / total_lines))
              echo "Coverage: ${coverage}%"
              if [ "$coverage" -lt 65 ]; then
                echo "::error::Coverage ${coverage}% is below 65% threshold"
                exit 1
              fi
            fi
          fi

  build:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --target lib/main/main_prod.dart

      - name: Build App Bundle
        run: flutter build appbundle --release --target lib/main/main_prod.dart
