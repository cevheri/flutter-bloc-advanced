  <!-- Disable browser back button for Flutter SPA -->
  <script>
    (function() {
      // Store initial URL
      let currentUrl = window.location.href;
      let isDisabled = false;

      // Capture and prevent popstate events
      window.addEventListener('popstate', function(event) {
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();

        // Restore URL
        if (window.location.href !== currentUrl) {
          window.history.pushState(null, '', currentUrl);
        }

        isDisabled = true;
        return false;
      }, true);

      // Capture beforeunload event
      window.addEventListener('beforeunload', function(event) {
        if (isDisabled) {
          event.preventDefault();
          event.returnValue = '';
          return '';
        }
      });

      // Override History API
      const originalPushState = window.history.pushState;
      const originalReplaceState = window.history.replaceState;
      const originalGo = window.history.go;

      window.history.pushState = function(state, title, url) {
        currentUrl = url || window.location.href;
        return originalPushState.call(this, state, title, url);
      };

      window.history.replaceState = function(state, title, url) {
        currentUrl = url || window.location.href;
        return originalReplaceState.call(this, state, title, url);
      };

      window.history.go = function(delta) {
        if (delta < 0) return;
        return originalGo.call(this, delta);
      };

      window.history.back = function() { return; };
      window.history.forward = function() { return; };

      // Store initial URL
      window.history.pushState(null, '', currentUrl);

      // Capture keyboard shortcuts (Alt+Backspace)
      document.addEventListener('keydown', function(event) {
        if (event.key === 'Backspace' && event.altKey) {
          event.preventDefault();
          event.stopPropagation();
          return false;
        }
      }, true);
    })();
  </script>
