<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="featureCard" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4F46E5"/>
    </marker>
    <style>
      .title { font: 700 32px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .feature-title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #4F46E5; }
      .layer-title { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #1E293B; }
      .box-label { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #64748B; }
      .shared-label { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1200" height="600" rx="32" fill="url(#bg)"/>

  <text x="60" y="60" class="title">Feature-First Clean Architecture</text>
  <text x="60" y="90" class="subtitle">Modular structure with feature-based encapsulation and shared foundation.</text>

  <!-- App Entry -->
  <rect x="60" y="140" width="220" height="100" rx="20" fill="white" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="85" y="175" class="layer-title" style="font-size: 18px;">App / Router</text>
  <text x="85" y="200" class="box-label">main_local.dart / main_prod.dart</text>
  <text x="85" y="218" class="box-label">app_router.dart (GoRouter)</text>

  <!-- Feature: Users -->
  <rect x="320" y="140" width="250" height="300" rx="24" fill="url(#featureCard)" stroke="#4F46E5" stroke-width="2" filter="url(#shadow)"/>
  <text x="445" y="175" class="feature-title" text-anchor="middle">Users Feature</text>
  
  <rect x="340" y="200" width="210" height="60" rx="12" fill="white" stroke="#E2E8F0"/>
  <text x="445" y="225" class="layer-title" text-anchor="middle">Presentation</text>
  <text x="445" y="245" class="box-label" text-anchor="middle">UserListPage, UserEditorPage</text>

  <rect x="340" y="270" width="210" height="60" rx="12" fill="white" stroke="#E2E8F0"/>
  <text x="445" y="295" class="layer-title" text-anchor="middle">Application</text>
  <text x="445" y="315" class="box-label" text-anchor="middle">UserBloc, Use Cases</text>

  <rect x="340" y="340" width="210" height="60" rx="12" fill="white" stroke="#E2E8F0"/>
  <text x="445" y="365" class="layer-title" text-anchor="middle">Data</text>
  <text x="445" y="385" class="box-label" text-anchor="middle">UserRepository, User (Model)</text>

  <!-- Feature: Auth / Account -->
  <rect x="610" y="140" width="250" height="300" rx="24" fill="url(#featureCard)" stroke="#4F46E5" stroke-width="2" filter="url(#shadow)"/>
  <text x="735" y="175" class="feature-title" text-anchor="middle">Auth Feature</text>

  <rect x="630" y="200" width="210" height="60" rx="12" fill="white" stroke="#E2E8F0"/>
  <text x="735" y="225" class="layer-title" text-anchor="middle">Presentation</text>
  <text x="735" y="245" class="box-label" text-anchor="middle">Login, Register, ForgotPwd</text>

  <rect x="630" y="270" width="210" height="60" rx="12" fill="white" stroke="#E2E8F0"/>
  <text x="735" y="295" class="layer-title" text-anchor="middle">Application</text>
  <text x="735" y="315" class="box-label" text-anchor="middle">LoginBloc, RegisterBloc</text>

  <rect x="630" y="340" width="210" height="60" rx="12" fill="white" stroke="#E2E8F0"/>
  <text x="735" y="365" class="layer-title" text-anchor="middle">Data</text>
  <text x="735" y="385" class="box-label" text-anchor="middle">AuthRepository, Token (Model)</text>

  <!-- Shared Foundation -->
  <rect x="60" y="480" width="1080" height="80" rx="24" fill="#F1F5F9" stroke="#94A3B8" stroke-dasharray="8 8"/>
  <text x="600" y="515" class="shared-label" text-anchor="middle">Shared / Core Infrastructure</text>
  <text x="600" y="540" class="box-label" text-anchor="middle">Common Widgets, Design System, Local Storage, API Client, Configuration, Utilities</text>

  <!-- External Sources -->
  <rect x="940" y="200" width="200" height="150" rx="20" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="1040" y="240" class="feature-title" text-anchor="middle">Data Sources</text>
  <text x="1040" y="275" class="box-label" text-anchor="middle">Rest API (Production)</text>
  <text x="1040" y="300" class="box-label" text-anchor="middle">Mock JSON Assets (Local)</text>

  <!-- Connectors -->
  <line x1="280" y1="190" x2="320" y2="190" stroke="#4F46E5" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="280" y1="190" x2="610" y2="190" stroke="#4F46E5" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Bidirectional arrows for Features <-> Shared -->
  <line x1="445" y1="440" x2="445" y2="480" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="735" y1="440" x2="735" y2="480" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Data flow Features <-> Data Sources -->
  <line x1="570" y1="370" x2="940" y2="300" stroke="#4F46E5" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <line x1="860" y1="370" x2="940" y2="300" stroke="#4F46E5" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

</svg>
