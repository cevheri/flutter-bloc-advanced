name: Build & deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.4'

      - name: Get dependencies
        run: flutter pub get

      - name: Build release project
        run: flutter build web --base-href /flutter-bloc-advanced/ --target lib/main/main_local.dart

      - name: Ensure .nojekyll exists in build output
        run: touch build/web/.nojekyll

      - name: Ensure .well-known directory exists in build output
        run: cp -r web/.well-known build/web/.well-known 2>/dev/null || true

      - name: Verify web assets
        run: |
          ls -la build/web/robots.txt
          ls -la build/web/sitemap.xml
          ls -la build/web/404.html
          ls -la build/web/browserconfig.xml
          ls -la build/web/.nojekyll
          ls -la build/web/llms.txt
          ls -la build/web/llms-full.txt
          ls -la build/web/humans.txt


      - name: Upload production-ready build files
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: build/web

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: production-files
          path: build/web

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.PAT_GITHUB_TOKEN }}
          publish_dir: build/web
