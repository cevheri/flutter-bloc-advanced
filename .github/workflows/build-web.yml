name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href /flutter-bloc-advanced/ --target lib/main/main_local.dart

      - name: Prepare deployment assets
        run: |
          touch build/web/.nojekyll
          cp -r web/.well-known build/web/.well-known 2>/dev/null || true

      - name: Verify web assets
        run: |
          echo "Checking required web assets..."
          for f in robots.txt sitemap.xml 404.html browserconfig.xml .nojekyll llms.txt llms-full.txt humans.txt; do
            test -f "build/web/$f" && echo "OK: $f" || echo "WARN: $f missing"
          done

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
