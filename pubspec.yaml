name: flutter_bloc_advance
description: "Flutter Bloc Advance Template"
publish_to: 'none'
version: 0.19.0+1

environment:
  sdk: ^3.11.1
  flutter: '3.41.4'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: 1.0.8
  flutter_localizations:
    sdk: flutter
  flutter_bloc: 9.1.1
  http: 1.6.0
  go_router: 17.1.0
  equatable: 2.0.8
  intl: 0.20.2
  pdf: 3.11.3
  printing: 5.14.2
  flutter_form_builder: 10.3.0+2
  form_builder_validators: 11.3.0
  intl_utils: 2.8.14
  http_certificate_pinning: 3.0.1
  bloc_concurrency: 0.3.0
  flutter_inappwebview: 6.1.5
  glob: 2.1.3
  shared_preferences: 2.5.4
  logger: 2.6.2
  get_storage: 2.1.1
  fl_chart: ^1.1.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0
  integration_test:
    sdk: flutter
  test: 1.30.0
  bloc_test: 10.0.0
  mockito: 5.6.3
  shared_preferences_platform_interface: 2.4.1
  device_preview: 1.3.1

flutter_secure_storage:
  enabled: true
  class_name: SecureStorage
  main_locale: en

flutter_intl:
  enabled: true
  template-arb-file: lib/l10n/intl_en.arb
  output-localization-file: l10n.dart
  output-class: S

flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

  assets:
    - assets/mock/
    - assets/images/
